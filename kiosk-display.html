<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FGC Production Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #1c1917; overflow: hidden; }
  body {
    display: grid;
    grid-template-columns: 42% 28% 30%;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
  }

  /* LEFT: month calendar */
  .calendar-pane { background: #ffffff; height: 100vh; border-right: 1px solid #292524; }
  .calendar-pane iframe { width: 100%; height: 100%; border: 0; }

  /* MIDDLE: scrolling schedule/agenda view */
  .schedule-pane { background: #ffffff; height: 100vh; border-right: 1px solid #292524; }
  .schedule-pane iframe { width: 100%; height: 100%; border: 0; }

  /* RIGHT: live production tracker sheet */
  .side-pane { height: 100vh; overflow: hidden; }
  .side-pane iframe { width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>

  <div class="calendar-pane">
    <!--
      This is your FGC Production calendar, embedded via its calendar ID.
      Requires that calendar's sharing setting to include "Make available to public" —
      otherwise this iframe will show a blank/login screen instead of the calendar.
      showTabs=1 keeps the Month/Week/Agenda switcher visible — with a USB or
      Bluetooth mouse connected to the TV, whoever's at the screen can click
      between views directly, no file edits needed.
    -->
    <iframe src="https://calendar.google.com/calendar/embed?src=9d4e2a261f159578188c727dc4b8e4a202eb362fce7c83951f847988a6928573%40group.calendar.google.com&ctz=America%2FLos_Angeles&mode=MONTH&showTitle=0&showPrint=0&showTabs=1&showCalendars=0"></iframe>
  </div>

  <div class="schedule-pane">
    <!-- Schedule/Agenda view — scrolling list, no day-cell truncation -->
    <iframe src="https://calendar.google.com/calendar/embed?src=9d4e2a261f159578188c727dc4b8e4a202eb362fce7c83951f847988a6928573%40group.calendar.google.com&ctz=America%2FLos_Angeles&mode=AGENDA&showTitle=0&showPrint=0&showTabs=0&showCalendars=0"></iframe>
  </div>

  <div class="side-pane">
    <!--
      Live Production Tracker sheet, published via File > Share > Publish to web.
      Only the Production Tracker tab is published — the Production Log tab
      stays private and is never part of what shows here.
    -->
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSmTpKUo-d-BMT7ecWg3nCjC52Mr6_omCJhdH1eJbgAOoY7czVe0E2lQxVtm0EdIh-nYnF_sFWTjGrZ/pubhtml?widget=true&headers=false"></iframe>
  </div>

  <script>
    // Kiosk display — reload the whole page every 5 minutes so it always
    // reflects the latest calendar events and Sheet/Doc content, without
    // anyone needing to touch the screen.
    setTimeout(() => location.reload(), 5 * 60 * 1000);
  </script>

</body>
</html>
