<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- No-cache headers: help TV browsers avoid serving a stale copy. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>FGC Production Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; background: #1c1917; overflow: hidden; }

  /* ============================================================
     ZOOM — resize the WHOLE display. Lower = smaller.
     To change size, edit ALL THREE numbers to match:
       scale 0.60 -> width/height 166.667%
       scale 0.50 -> width/height 200%
       scale 0.70 -> width/height 142.857%
     (Just tell me the size you want and I'll set them.)
     ============================================================ */
  #zoom {
    display: grid;
    grid-template-columns: 42% 28% 30%;
    width: 166.667%;
    height: 166.667%;
    transform: scale(0.60);
    transform-origin: top left;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
  }

  /* ============================================================
     LEFT COLUMN: month calendar on top (shortened), with a single
     bottom strip split into two side-by-side boxes underneath —
     Time Off (narrow) and Samples (wide). The calendar flexes to
     fill whatever height is left, so it just gets a bit shorter.
     ============================================================ */
  .left-col {
    display: flex;
    flex-direction: column;
    height: 100%;
    border-right: 1px solid #292524;
  }

  .cal-frame { flex: 1 1 auto; min-height: 0; background: #ffffff; }
  .cal-frame iframe { width: 100%; height: 100%; border: 0; display: block; }

  /* Bottom strip: two boxes side by side, each sized to its list. */
  .bottom-row { flex: 0 0 auto; display: flex; border-top: 2px solid #292524; }

  .info-block {
    background: #1c1917;
    color: #e7e5e4;
    padding: 10px 14px;
    overflow-y: auto;
  }
  .info-block.timeoff { flex: 0 0 30%; border-right: 1px solid #292524; }  /* narrow */
  .info-block.samples { flex: 1 1 0; }                                     /* takes the rest — most of the space */

  .info-block h2 {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #d97706;                 /* amber accent — matches the sheet's sparkline */
    font-weight: 700;
    margin-bottom: 6px;
  }

  /* --- Time Off entries (one line each: name + date, glyph status on the right) --- */
  .to-entry {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid #292524;
  }
  .to-entry:last-child { border-bottom: 0; }
  .to-entry .who    { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .to-entry .when   { font-size: 13px; color: #a8a29e; flex: 1; }
  .to-entry .status { font-size: 15px; white-space: nowrap; }

  /* Status = shape first (✓ vs hourglass), color only as faint backup — never color alone. */
  .status.approved  { color: #a3e635; }
  .status.requested { color: #fbbf24; }

  /* --- Samples list --- */
  .samples-list { list-style: none; }
  .samples-list li {
    font-size: 15px;
    line-height: 1.5;
    padding: 2px 0;
    border-bottom: 1px solid #292524;
  }
  .samples-list li:last-child { border-bottom: 0; }
  .samples-list li::before { content: "\2022\00a0"; color: #d97706; }  /* • */

  .empty-note { font-size: 14px; color: #78716c; font-style: italic; padding: 2px 0; }

  /* MIDDLE: scrolling schedule/agenda view */
  .schedule-pane { background: #ffffff; height: 100%; border-right: 1px solid #292524; }
  .schedule-pane iframe { width: 100%; height: 100%; border: 0; display: block; }

  /* RIGHT: live production tracker sheet */
  .side-pane { height: 100%; overflow: hidden; }
  .side-pane iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>
<div id="zoom">

  <div class="left-col">

    <!-- Month calendar (public, showTabs=1 so Month/Week/Agenda stays clickable with a mouse) -->
    <div class="cal-frame">
      <iframe src="https://calendar.google.com/calendar/embed?src=9d4e2a261f159578188c727dc4b8e4a202eb362fce7c83951f847988a6928573%40group.calendar.google.com&ctz=America%2FLos_Angeles&mode=MONTH&showTitle=0&showPrint=0&showTabs=1&showCalendars=0"></iframe>
    </div>

    <div class="bottom-row">

      <!-- TIME OFF (narrow) — populated from the Google Sheet. Placeholder rows preview the look. -->
      <section class="info-block timeoff">
        <h2>Time Off</h2>
        <div id="timeoff-rows">
          <div class="to-entry"><span class="who">Maria G.</span><span class="when">Jul 7 &ndash; 8</span><span class="status approved">&#10003;</span></div>
          <div class="to-entry"><span class="who">David R.</span><span class="when">Jul 10</span><span class="status requested">&#8987;</span></div>
        </div>
      </section>

      <!-- SAMPLES (wide) — populated from the Google Sheet. Placeholder rows preview the look. -->
      <section class="info-block samples">
        <h2>Samples to Make</h2>
        <ul class="samples-list" id="samples-rows">
          <li class="empty-note" style="list-style:none">Loading&hellip;</li>
        </ul>
      </section>

    </div>

  </div>

  <div class="schedule-pane">
    <iframe src="https://calendar.google.com/calendar/embed?src=9d4e2a261f159578188c727dc4b8e4a202eb362fce7c83951f847988a6928573%40group.calendar.google.com&ctz=America%2FLos_Angeles&mode=AGENDA&showTitle=0&showPrint=0&showTabs=0&showCalendars=0"></iframe>
  </div>

  <div class="side-pane">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSmTpKUo-d-BMT7ecWg3nCjC52Mr6_omCJhdH1eJbgAOoY7czVe0E2lQxVtm0EdIh-nYnF_sFWTjGrZ/pubhtml?widget=true&headers=false"></iframe>
  </div>

</div><!-- /#zoom -->

  <script>
  /* ================================================================
     LIST SOURCES  ← paste your two published-CSV URLs here.

     These can be two new tabs on your EXISTING production sheet — no
     separate spreadsheet needed. One-time setup:
       1. Add two tabs: "Time Off" and "Samples".
          - Time Off tab, row 1 headers:  Name | Dates | Status
          - Samples  tab, row 1 header:   Sample     (one sample per row)
       2. File > Share > Publish to web. Pick the "Time Off" tab,
          format = Comma-separated values (.csv), Publish, copy the URL
          into TIMEOFF_CSV. Repeat for "Samples" into SAMPLES_CSV.
          (Your Production Log tab stays unpublished/private, as now.)

     Until real URLs are pasted in, the placeholder rows above stay shown.
     ================================================================ */
  var TIMEOFF_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmTpKUo-d-BMT7ecWg3nCjC52Mr6_omCJhdH1eJbgAOoY7czVe0E2lQxVtm0EdIh-nYnF_sFWTjGrZ/pub?gid=1792980750&single=true&output=csv";
  var SAMPLES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmTpKUo-d-BMT7ecWg3nCjC52Mr6_omCJhdH1eJbgAOoY7czVe0E2lQxVtm0EdIh-nYnF_sFWTjGrZ/pub?gid=1492618378&single=true&output=csv";

  // --- tiny, dependency-free CSV parser (handles quoted fields & commas) ---
  function parseCSV(text) {
    var rows = [], row = [], field = "", q = false, i, c;
    for (i = 0; i < text.length; i++) {
      c = text[i];
      if (q) {
        if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else q = false; }
        else field += c;
      } else {
        if (c === '"') q = true;
        else if (c === ",") { row.push(field); field = ""; }
        else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
        else if (c !== "\r") field += c;
      }
    }
    if (field !== "" || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function fetchCSV(url) {
    return fetch(url + (url.indexOf("?") > -1 ? "&" : "?") + "_=" + Date.now(),
                 { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(parseCSV);
  }

  // Rows with an empty first cell are treated as blank/spacer rows and skipped.
  function dataRows(rows) {
    return rows.slice(1).filter(function (r) { return r[0] && r[0].trim() !== ""; });
  }

  function renderTimeOff(rows) {
    var box = document.getElementById("timeoff-rows");
    box.textContent = "";
    var data = dataRows(rows);
    if (!data.length) { box.innerHTML = '<div class="empty-note">None scheduled</div>'; return; }
    data.forEach(function (r) {
      var raw = (r[2] || "").trim(), cls = "", glyph = "";
      if (/^appr/i.test(raw)) { cls = "approved"; glyph = "\u2713"; }       // check mark
      else if (/^req/i.test(raw)) { cls = "requested"; glyph = "\u23F3"; }  // hourglass
      var entry = document.createElement("div"); entry.className = "to-entry";
      var who = document.createElement("span"); who.className = "who"; who.textContent = r[0] || "";
      var when = document.createElement("span"); when.className = "when"; when.textContent = r[1] || "";
      var st  = document.createElement("span"); st.className = "status " + cls; st.textContent = glyph;
      entry.appendChild(who); entry.appendChild(when); entry.appendChild(st);
      box.appendChild(entry);
    });
  }

  function renderSamples(rows) {
    var box = document.getElementById("samples-rows");
    box.textContent = "";
    var data = dataRows(rows);
    if (!data.length) { box.innerHTML = '<li class="empty-note" style="list-style:none">None right now</li>'; return; }
    data.forEach(function (r) {
      var text = r.filter(function (c) { return c && c.trim() !== ""; }).join("  \u2014  ");
      var li = document.createElement("li"); li.textContent = text;
      box.appendChild(li);
    });
  }

  function loadLists() {
    if (/^https?:/.test(TIMEOFF_CSV)) {
      fetchCSV(TIMEOFF_CSV).then(renderTimeOff)
        .catch(function (e) { console.warn("Time Off load failed:", e); });
    }
    if (/^https?:/.test(SAMPLES_CSV)) {
      fetchCSV(SAMPLES_CSV).then(renderSamples)
        .catch(function (e) { console.warn("Samples load failed:", e); });
    }
  }

  loadLists();                             // on page load
  setInterval(loadLists, 2 * 60 * 1000);   // refresh just the lists every 2 min

  // Full page reload every 5 min (cache-busting) so calendar + sheet stay fresh too.
  setTimeout(function () {
    var url = new URL(location.href);
    url.searchParams.set("t", Date.now());
    location.replace(url.toString());
  }, 5 * 60 * 1000);
  </script>

</body>
</html>
